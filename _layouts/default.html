<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="topnav">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ '/' | relative_url }}">RE</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/current_status' | relative_url }}" {% if page.url contains 'current_status' %}class="active"{% endif %}>Now</a>
        <a href="{{ '/academic_experience' | relative_url }}" {% if page.url contains 'academic_experience' %}class="active"{% endif %}>Academic</a>
        <a href="{{ '/industry_experience' | relative_url }}" {% if page.url contains 'industry_experience' %}class="active"{% endif %}>Industry</a>
        <a href="{{ '/education' | relative_url }}" {% if page.url contains 'education' %}class="active"{% endif %}>Education</a>
        <a href="{{ '/publications' | relative_url }}" {% if page.url contains 'publications' %}class="active"{% endif %}>Publications</a>
        <a href="{{ '/Presentations_Contributions' | relative_url }}" {% if page.url contains 'Presentations' %}class="active"{% endif %}>Talks</a>
        <a href="{{ '/blog' | relative_url }}" {% if page.url contains 'blog' %}class="active"{% endif %}>Blog</a>
        <a href="{{ '/assets/Rasika_Edirisinghe-CV.pdf' | relative_url }}" target="_blank" class="nav-cv">CV</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    </div>
  </nav>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>Rasika Edirisinghe &middot; Marie Curie Early Career Researcher &middot; UCC Ireland</span>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/rasikaedirisinghe/" target="_blank">LinkedIn</a>
        <a href="https://github.com/mrHendrixSL/" target="_blank">GitHub</a>
        <a href="https://orcid.org/0009-0008-4673-0259" target="_blank">ORCID</a>
        <a href="https://scholar.google.com/citations?user=o_7ZjgMAAAAJ&hl=en" target="_blank">Scholar</a>
      </div>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>

</body>
</html>
